version: '3.9'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: interviewiq_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: interviewiq
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d interviewiq"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin (optional DB GUI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: interviewiq_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@interviewiq.ai
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interviewiq_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/interviewiq
      GROQ_API_KEY: ${GROQ_API_KEY}
      MODEL_NAME: llama-3.3-70b-versatile
      JWT_SECRET: ${JWT_SECRET:-interviewiq-super-secret-key-2024}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
  pgadmin_data:
