# Render Blueprint — defines both services for auto-deploy
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Backend: FastAPI ──────────────────────────────────────────────────────
  - type: web
    name: interviewiq-backend
    runtime: docker
    rootDir: backend          # Render will look for Dockerfile inside ./backend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: interviewiq-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false           # You'll set this manually in Render dashboard
      - key: MODEL_NAME
        value: llama-3.3-70b-versatile
      - key: JWT_SECRET
        generateValue: true   # Render auto-generates a secure random value
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"

  # ── Frontend: React/Vite (served by Nginx) ────────────────────────────────
  - type: web
    name: interviewiq-frontend
    runtime: docker
    rootDir: frontend         # Render will look for Dockerfile inside ./frontend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: VITE_API_URL
        sync: false           # Set this to your backend URL after deploying backend

# ── PostgreSQL Database ───────────────────────────────────────────────────────
databases:
  - name: interviewiq-db
    plan: free
    databaseName: interviewiq
    user: postgres
